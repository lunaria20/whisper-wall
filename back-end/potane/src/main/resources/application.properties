spring.application.name=potane

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/whisperwall?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# JWT Configuration
app.jwt.secret=whisperwall-secret-key-that-should-be-changed-in-production-with-a-very-long-and-secure-string
app.jwt.expiration=86400000

# CORS Configuration
app.cors.allowedOrigins=*
app.cors.allowedMethods=*
app.cors.allowedHeaders=*
app.cors.allowCredentials=true
app.cors.maxAge=3600
