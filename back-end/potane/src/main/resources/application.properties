spring.application.name=potane
spring.config.import=optional:file:.env[.properties],optional:file:.env.local[.properties],optional:file:./potane/.env[.properties],optional:file:./potane/.env.local[.properties],optional:file:./back-end/potane/.env[.properties],optional:file:./back-end/potane/.env.local[.properties]

# Database Configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER:org.postgresql.Driver}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT:30000}
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME:1800000}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT:30000}

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${DB_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server Configuration
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/api

# JWT Configuration
app.jwt.secret=${JWT_SECRET:your-secret-key-here}
app.jwt.expiration=86400000

# CORS Configuration
app.cors.allowedOrigins=*
app.cors.allowedMethods=*
app.cors.allowedHeaders=*
app.cors.allowCredentials=true
app.cors.maxAge=3600

# Supabase
app.supabase.url=${SUPABASE_URL:https://mqssfwzsisxwpdiujiwl.supabase.co}
app.supabase.anon-key=${SUPABASE_ANON_KEY:your-anon-key-here}
